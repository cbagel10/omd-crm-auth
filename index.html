<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMD CRM — Microsoft Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: #1a1f2e;
    border: 1px solid #2d3748;
    border-radius: 12px;
    padding: 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 48px; height: 48px;
    background: rgba(45,127,249,0.15);
    border: 1px solid rgba(45,127,249,0.3);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    color: #2d7ff9;
  }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  p  { font-size: 14px; color: #94a3b8; line-height: 1.6; }
  .status {
    margin-top: 24px; padding: 16px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
  }
  .status.success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #22c55e; }
  .status.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #ef4444; }
  .status.loading { background: rgba(45,127,249,0.1); border: 1px solid rgba(45,127,249,0.3); color: #2d7ff9; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(45,127,249,0.3); border-top-color: #2d7ff9;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    display: inline-block; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <h1>Oates Metal Deck CRM</h1>
  <p>Microsoft sign-in redirect</p>
  <div id="status" class="status loading">
    <span class="spinner"></span> Processing sign-in...
  </div>
</div>
<script>
  const statusEl = document.getElementById('status');

  function setStatus(type, msg) {
    statusEl.className = 'status ' + type;
    statusEl.innerHTML = msg;
  }

  function handleRedirect() {
    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const query  = new URLSearchParams(window.location.search);

    const accessToken = params.get('access_token');
    const error       = params.get('error') || query.get('error');
    const errorDesc   = params.get('error_description') || query.get('error_description');

    if (error) {
      setStatus('error', '&#x2717; Sign-in failed: ' + (errorDesc || error));
      return;
    }

    if (!accessToken) {
      setStatus('error', '&#x2717; No token received. Close this tab and try again from the CRM.');
      return;
    }

    const expiresIn = parseInt(params.get('expires_in') || '3600');
    const expiry    = Date.now() + (expiresIn * 1000);

    try {
      localStorage.setItem('ms_access_token', accessToken);
      localStorage.setItem('ms_token_expiry',  String(expiry));
    } catch(e) {
      setStatus('error', '&#x2717; Could not save token: ' + e.message);
      return;
    }

    setStatus('success', '&#x2713; Signed in! You can close this tab and return to the CRM.');
    setTimeout(() => { try { window.close(); } catch(e) {} }, 2000);
  }

  handleRedirect();
</script>
</body>
</html>
